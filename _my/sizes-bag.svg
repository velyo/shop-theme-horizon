<svg xmlns="http://w3.org" viewBox="0 0 900 700" width="100%" height="100%">
  <defs>
    <!-- ГРАДИЕНТИ ЗА РЕАЛИСТИЧНА КОЖА И СЕНКИ -->
    <!-- Преден панел: от по-светло към по-тъмно за обем -->
    <linearGradient id="leather-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcfcfd" />
      <stop offset="40%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#e5e7eb" />
    </linearGradient>
    
    <!-- Страничен панел: в сянка за 3D дълбочина -->
    <linearGradient id="leather-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1d5db" />
      <stop offset="70%" stop-color="#e5e7eb" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>

    <!-- Горна извивка (Обем горе) -->
    <linearGradient id="leather-top" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e5e7eb" />
      <stop offset="100%" stop-color="#f9fafb" />
    </linearGradient>

    <!-- Златен обков -->
    <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#ca8a04" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>

    <!-- Мека сянка под чантата -->
    <radialGradient id="drop-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>

    <!-- СТИЛОВЕ -->
    <style>
      .bag-edge { stroke: #374151; stroke-width: 2; stroke-linejoin: round; }
      .stitch-line { fill: none; stroke: #9ca3af; stroke-width: 1.2; stroke-dasharray: 4,3; }
      .handle-style { fill: none; stroke: #1f2937; stroke-width: 7; stroke-linecap: round; }
      
      /* Оразмерителни линии */
      .dim-line { fill: none; stroke: #dc2626; stroke-width: 2.5; marker-start: url(#arrow-start); marker-end: url(#arrow-end); }
      .dim-ext { fill: none; stroke: #fca5a5; stroke-width: 1.5; }
      .dim-arrow { fill: #dc2626; }
      .dim-text { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #dc2626; text-anchor: middle; }
    </style>
    
    <!-- Маркери за стрелки -->
    <marker id="arrow-start" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" class="dim-arrow"/>
    </marker>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="dim-arrow"/>
    </marker>
  </defs>

  <!-- Бял фон -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- СЯНКА НАД ЗЕМЯТА ЗА РЕАЛИЗЪМ -->
  <ellipse cx="430" cy="560" rx="260" ry="25" fill="url(#drop-shadow)" />

  <!-- ГРУПА 1: ОБЕМНА ДАМСКА ЧАНТА -->
  <g id="real-volume-bag" transform="translate(40, 10)">
    
    <!-- Задна дръжка -->
    <path d="M 390 230 C 390 60, 520 60, 520 210" class="handle-style" opacity="0.3" />

    <!-- 1. СТРАНИЧЕН ПАНЕЛ (Ширина със заобляне) -->
    <path d="M 210 310 
             C 210 270, 240 250, 270 250
             L 270 495
             C 240 495, 210 515, 210 540 Z" fill="url(#leather-side)" class="bag-edge" />
    <!-- Страничен шев за детайл -->
    <path d="M 240 260 L 240 515" class="stitch-line" />

    <!-- 2. ГОРЕН ОБЕМЕН ПАНЕЛ (Показва дебелината/обема в горната част) -->
    <path d="M 270 250 
             C 370 220, 490 190, 580 170
             C 590 180, 590 195, 580 205
             C 490 225, 370 255, 270 285
             C 255 275, 255 260, 270 250 Z" fill="url(#leather-top)" class="bag-edge" />

    <!-- 3. ПРЕДЕН ПАНЕЛ (Основното тяло на чантата) -->
    <path d="M 270 285
             C 370 255, 490 225, 580 205
             C 610 280, 620 400, 595 475
             C 500 505, 370 535, 270 550
             C 250 470, 250 360, 270 285 Z" fill="url(#leather-front)" class="bag-edge" />

    <!-- Елегантни дизайнерски гънки и шевове по предния панел -->
    <path d="M 290 305 C 380 280, 480 250, 565 230" class="stitch-line" />
    <path d="M 290 525 C 380 500, 480 470, 570 450" class="stitch-line" />
    
    <!-- Преден хоризонтален шикозен колан -->
    <path d="M 265 355 C 365 325, 485 295, 585 275 L 590 300 C 490 320, 370 350, 260 380 Z" fill="#e5e7eb" opacity="0.8" stroke="#4b5563" stroke-width="1" />

    <!-- 4. ПРЕДНА ДРЪЖКА -->
    <path d="M 375 245 C 375 40, 505 40, 505 190" class="handle-style" />
    
    <!-- ЛУКСОЗЕН ЗЛАТЕН ОБКОВ (Катарами за дръжките) -->
    <!-- Лява катарама -->
    <rect x="368" y="235" width="14" height="25" rx="3" fill="url(#gold-metal)" stroke="#451a03" stroke-width="1" />
    <rect x="365" y="255" width="20" height="8" rx="1" fill="url(#gold-metal)" stroke="#451a03" stroke-width="1" />
    <!-- Дясна катарама -->
    <rect x="498" y="185" width="14" height="25" rx="3" fill="url(#gold-metal)" stroke="#451a03" stroke-width="1" />
    <rect x="495" y="205" width="20" height="8" rx="1" fill="url(#gold-metal)" stroke="#451a03" stroke-width="1" />
    
    <!-- Метално лого/акцент в центъра -->
    <circle cx="430" cy="380" r="10" fill="url(#gold-metal)" stroke="#451a03" stroke-width="1" />
    <polygon points="430,373 436,385 424,385" fill="#ffffff" />
  </g>

  <!-- ГРУПА 2: ТЕХНИЧЕСКИ ОРАЗМЕРИТЕЛНИ ЛИНИИ -->
  <g id="dimension-lines">
    <!-- 1. ДЪЛЖИНА (L) -->
    <line x1="300" y1="585" x2="630" y2="505" class="dim-line" />
    <line x1="310" y1="545" x2="290" y2="595" class="dim-ext" />
    <line x1="635" y1="465" x2="620" y2="515" class="dim-ext" />

    <!-- 2. ВИСОЧИНА (H) -->
    <line x1="675" y1="160" x2="655" y2="465" class="dim-line" />
    <line x1="620" y1="160" x2="690" y2="160" class="dim-ext" />
    <line x1="635" y1="465" x2="690" y2="465" class="dim-ext" />

    <!-- 3. ШИРИНА / ДЪЛБОЧИНА (W) -->
    <line x1="140" y1="535" x2="235" y2="560" class="dim-line" />
    <line x1="250" y1="530" x2="240" y2="575" class="dim-ext" />
    <line x1="150" y1="495" x2="135" y2="545" class="dim-ext" />
  </g>

  <!-- ГРУПА 3: СТОЙНОСТИ НА РАЗМЕРИТЕ (ЛЕСНА ЗАМЕНА) -->
  <!-- Стойностите се променят директно оттук -->
  <g id="dimensions-text">
    <!-- Дължина -->
    <text id="length-value" x="465" y="565" class="dim-text" transform="rotate(-13, 465, 565)">38 см</text>
    
    <!-- Височина -->
    <text id="height-value" x="705" y="310" class="dim-text">26 см</text>
    
    <!-- Ширина -->
    <text id="width-value" x="180" y="580" class="dim-text">15 см</text>
  </g>
</svg>
